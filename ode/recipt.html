<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Venue </title>
    <style>
       
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --magenta: #ff00ff;
            --cyan: #00ffff;
            --yellow: #ffff00;
            --black: #000000;
            --border: 4px solid #000;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--cyan);
            background-image: radial-gradient(#0000001a 1.5px, transparent 0);
            background-size: 24px 24px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 2. Header */
        header {
            background: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: var(--border);
        }

        .logo { font-size: 1.5rem; font-style: italic; font-weight: 900; }
        
        .nav-btn {
            background: var(--yellow);
            border: 2px solid var(--black);
            padding: 8px 16px;
            font-weight: bold;
            font-size: 0.7rem;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--black);
            text-decoration: none;
            color: black;
        }

        /* 3. Middle Section: Venue Details */
        main {
            flex: 1;
            padding: 60px 5%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .venue-card {
            background: white;
            border: var(--border);
            box-shadow: 12px 12px 0px var(--black);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
        }

        .map-placeholder {
            width: 100%;
            height: 400px;
            background-color: #eee;
            background-image: url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?w=1000');
            background-size: cover;
            background-position: center;
            border-bottom: var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .location-tag {
            background: var(--magenta);
            color: white;
            padding: 10px 20px;
            border: 3px solid var(--black);
            font-size: 1.2rem;
            box-shadow: 5px 5px 0px var(--black);
        }

        .venue-info {
            padding: 40px;
            background: white;
        }

        .venue-info h1 {
            text-transform: uppercase;
            font-size: 2.5rem;
            margin-bottom: 10px;
            -webkit-text-stroke: 1px var(--black);
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .detail-box {
            border: 2px solid var(--black);
            padding: 15px;
            background: #fdfdfd;
        }

        /* 4. Footer */
        footer {
            background: white;
            border-top: var(--border);
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-link {
            font-size: 0.8rem;
            color: var(--black);
            text-decoration: underline;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">NEXUS</div>
        <a href="index.html" class="nav-btn">BACK TO DASHBOARD</a>
    </header>

    <main>
        <div class="venue-card">
            <div class="map-placeholder">
                <div class="location-tag">LIVE</div>
            </div>

            <div class="venue-info">
                <h1>Venue Location</h1>
                <p>Industrial Sector 7, Neon District, Night City 2026</p>
                
                <div class="details-grid">
                    <div class="detail-box">
                        <small>CAPACITY</small>
                        <p>5,000 VIBERS</p>
                    </div>
                    <div class="detail-box">
                        <small>NEAREST STATION</small>
                        <p>CYBER-RAIL NORTH</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div style="font-size: 0.9rem;">NEXUS</div>
        <div>
            <a href="index.html" class="footer-link">HOME</a> | 
            <a href="dashboard.html" class="footer-link">MY STATS</a>
        </div>
    </footer>

</body>
</html>
