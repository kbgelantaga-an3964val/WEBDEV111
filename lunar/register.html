<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resort Gallery | Luna Vista</title>
    <style>
        /* 1. Layout Structure (Matching image_250cff.png) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #FFD952; }

        .wrapper {
            display: grid;
            grid-template-areas: 
                "header header"
                "sidebar main"
                "footer footer";
            grid-template-columns: 280px 1fr;
            grid-template-rows: 100px 1fr 60px;
            min-height: 100vh;
        }

        /* 2. Header & Sidebar (Consistent with other pages) */
        .header {
            grid-area: header;
          ;
            border-bottom: 2px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }
        .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; }

        .sidebar {
            grid-area: sidebar;
            background: #FFD952;
            border-right: 1px solid #ddd;
            padding: 20px;
        }
        .nav-links { list-style: none; }
        .nav-links li { margin-bottom: 12px; }
        .nav-links a {
            text-decoration: none;
            color: #f4f7f6;
            font-weight: 600;
            display: block;
            padding: 10px;
            border-radius: 4px;
        }
        .nav-links a:hover { background: #FFD952; color: #f4f7f6; }

        /* 3. Main Gallery Area */
        .main-content {
            grid-area: main;
            padding: 30px;
            overflow-y: auto;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            height: 200px;
            background: #f4f7f6;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ccc;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .gallery-item:hover { transform: scale(1.03); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        .img-label {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 10px;
            font-size: 0.8rem;
            text-align: center;
        }

        /* 4. Footer */
        .footer {
            grid-area: footer;
            background: #f4f7f6;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }
    </style>
</head>
<body bgcolor="f4f7f6">

<div class="wrapper"style="background: #f4f7f6; color: #e67e22;" >
    <header class="header">
        <div class="logo"style="background: #f4f7f6; color: #e67e22;" >LUNA VISTA RESORT</div>

    </header>

    <aside class="sidebar">
        <ul class="nav-links">
            <li><a href="index.html"style="background: #f4f7f6; color: #e67e22;" >Home</a></li>
            <li><a href="billing.html"style="background: #f4f7f6; color: #e67e22;" >BOOK UP</a></li>
            <li><a href="register.html" style="background: #f4f7f6; color: #e67e22;">Gallery</a></li>
            <li><a href="recipt.html"style="background: #f4f7f6; color: #e67e22;" >About us</a></li>

        </ul>
    </aside>

    <main class="main-content">
        <h2 style="margin-bottom: 20px;" >Gallery PICTURES</h2>
        
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?auto=format&fit=crop&w=500" alt="Resort Pool">
                <div class="img-label">Infinity Pool View</div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1540541338287-41700207dee6?auto=format&fit=crop&w=500" alt="Ocean Villa">
                <div class="img-label">Oceanfront Villa</div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=500" alt="Special Dish">
                <div class="img-label">Chef's Special Steak</div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=500" alt="Salad">
                <div class="img-label">Healthy Quinoa Bowl</div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=500" alt="Resort Night">
                <div class="img-label">Luna Vista at Night</div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1596436889106-be35e843f974?auto=format&fit=crop&w=500" alt="Room Interior">
                <div class="img-label">Suite Interior</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        &copy; 2026 Luna Vista Resort | Managed by FreshBite Prep
    </footer>
</div>

</body>
</html>
