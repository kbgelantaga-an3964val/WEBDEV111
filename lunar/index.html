<!DOCTYPE html>
<html lang="en">
<head>

    <title>FreshBite Prep | Home</title>
	<style>
	* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; }

.layout-grid {
    display: grid;
    grid-template-rows: 80px 1fr 400px; /* Header, Content, Video Footer */
    min-height: 100vh;
}


.header-area {
    background: #fff;
    border-bottom: 2px solid #1a1a1a;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
}
.logo { font-weight: bold; font-size: 1.5rem; letter-spacing: 2px; }
.top-nav a { margin: 0 15px; text-decoration: none; color: #333; font-weight: 600; }
.sign-up-toggle { background: #e67e22; color: #fff; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }


.video-footer {
    position: relative;
    overflow: hidden;
    border-top: 2px solid #1a1a1a;
}
.bg-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
}
.video-overlay {
    position: relative;
    z-index: 2;
    height: 500%;
    background: rgba(0,0,0,0.4); /* Darkens video to make text readable */
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    font-size: 2rem;
}
</style>
</head>
<body>

    <div class="layout-grid">

            </nav>
        </header>


        <footer class="video-footer">
