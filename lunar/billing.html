<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing</title>
    <style>
        /* 1. Layout Structure (Matches your Grid Design) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Georgia', serif; background-color: #fdfaf6; height: 100vh; }

        .layout-wrapper {
            display: grid;
            grid-template-areas: 
                "header header"
                "sidebar main"
                "footer footer";
            grid-template-columns: 300px 1fr;
            grid-template-rows: 100px 1fr 60px;
            height: 100vh;
        }

        .header { grid-area: header; background: #FFD952; border-bottom: 2px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }
        .sidebar { grid-area: sidebar; background: #fff; border-right: 2px solid #eee; padding: 20px; }
        .main-content { grid-area: main; padding: 30px; overflow-y: auto; }

        /* 2. Billing Calculator Styling */
        .billing-box { background: white; padding: 30px; border: 2px solid #1a1a1a; border-radius: 8px; margin-top: 20px; }
        .calc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        
        .total-display { font-size: 1.5rem; font-weight: bold; color: #8b4513; border-top: 2px solid #8b4513; padding-top: 15px; margin-top: 15px; }

        /* 3. Receipt Modal (Hidden by Default) */
        #receipt-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            background: white;
            padding: 40px;
            border: 2px solid #000;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .receipt-header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 10px; margin-bottom: 15px; }
        .receipt-line { display: flex; justify-content: space-between; margin: 10px 0; }
        .grand-total { border-top: 2px solid #000; padding-top: 10px; font-weight: bold; }

        /* 4. Print Logic */
        @media print {
            body * { visibility: hidden; }
            #receipt-modal, #receipt-modal * { visibility: visible; }
            #receipt-modal { position: absolute; top: 0; left: 0; transform: none; border: none; }
            .btn-action { display: none; }
        }

        .btn-action { background: #1a1a1a; color: white; padding: 12px 25px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; }
        .btn-action:hover { background: #333; }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <header class="header">
        <div style="font-size: 1.5rem; font-weight: bold;">LUNA VISTA</div>
        <div style="color: #e67e22;"><a href="index.html">Go back</a></div>
    </header>

    <aside class="sidebar">
        <h3>Services</h3>
        <p style="padding:10px 0; border-bottom:1px solid #eee;"> Rooms & Hours</p>
        <p style="padding:10px 0; border-bottom:1px solid #eee;"> Food & Menu</p>
        <p style="padding:10px 0; border-bottom:1px solid #eee;"> Spa & Wellness</p>
    </aside>

    <main class="main-content">
        <h2>Resort Billing Calculator</h2>
        <div class="billing-box">
            <div class="calc-row">
                <div>
                    <label>Select Villa / Room</label>
                    <select id="roomRate" onchange="calculate()">
                        <option value="0">Day Use Only (No Room)</option>
                        <option value="300">Garden Villa ($300/night)</option>
                        <option value="600">Overwater Suite ($600/night)</option>
						
                    </select>
                </div>
                <div>
                    <label>Nights Stay</label>
                    <input type="number" id="nights" value="0" min="0" oninput="calculate()">
                </div>
            </div>

            <div class="calc-row">
                <div>
                    <label>Day Use Hours</label>
                    <input type="number" id="hours" value="0" min="0" oninput="calculate()">
                    <small>$25.00 per hour</small>
                </div>
                <div>
                    <label>Total Guest(s)</label>
                    <input type="number" id="guests" value="1" min="1" oninput="calculate()">
                </div>
            </div>

            <div class="total-display" id="totalResult">Estimated Total: $0.00</div>
            <br>
            <button class="btn-action" onclick="showReceipt()">Generate & Print Receipt</button>
        </div>
    </main>

    <footer class="header" style="grid-area: footer; border-top: 1px solid #ddd; height: 60px; justify-content: center; font-size: 0.8rem;">
        LUNA VISTA
    </footer>
</div>

<div id="receipt-modal">
    <div class="receipt-header">
        <h2>OFFICIAL RECEIPT</h2>
        <p>LUNA VISTA</p>
        <p id="receiptDate" style="font-size: 0.8rem;"></p>
    </div>
    
    <div class="receipt-line"><span>Room Accommodations:</span> <span id="recRoom">$0.00</span></div>
    <div class="receipt-line"><span>Day Use Charges:</span> <span id="recHours">$0.00</span></div>
    <div class="receipt-line"><span>Tax (12%):</span> <span id="recTax">$0.00</span></div>
    
    <div class="receipt-line grand-total"><span>GRAND TOTAL:</span> <span id="recTotal">$0.00</span></div>
    
    <button class="btn-action" style="margin-top: 20px;" onclick="window.print()">Print Document</button>
    <button class="btn-action" style="background:#eee; color:#333; margin-top: 10px;" onclick="closeModal()">Close</button>
</div>

<script>
    function calculate() {
        const rate = parseFloat(document.getElementById('roomRate').value);
        const nights = parseInt(document.getElementById('nights').value) || 0;
        const hours = parseInt(document.getElementById('hours').value) || 0;
        
        const roomTotal = rate * nights;
        const hourlyTotal = hours * 25;
        const total = roomTotal + hourlyTotal;

        document.getElementById('totalResult').innerText = "Estimated Total: $" + total.toFixed(2);
        return { roomTotal, hourlyTotal, total };
    }

    function showReceipt() {
        const data = calculate();
        const tax = data.total * 0.12;
        const finalTotal = data.total + tax;

        document.getElementById('receiptDate').innerText = new Date().toLocaleString();
        document.getElementById('recRoom').innerText = "$" + data.roomTotal.toFixed(2);
        document.getElementById('recHours').innerText = "$" + data.hourlyTotal.toFixed(2);
        document.getElementById('recTax').innerText = "$" + tax.toFixed(2);
        document.getElementById('recTotal').innerText = "$" + finalTotal.toFixed(2);

        document.getElementById('receipt-modal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('receipt-modal').style.display = 'none';
    }
</script>

</body>
</html>
